<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AIオススメ本</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/recommend.css}">
</head>
<body class="main-body">

<div class="main-container">

    <div class="card header-card">
        <h2>AIおすすめ本</h2>
        <p class="sub-text">あなたのレベルと読みたい本の種類、ジャンルに合わせて、AIが3冊おすすめします。</p>
        
        <div class="navigation-links">
            <a th:href="@{/users/main}">← メイン画面へ</a>
            <a th:href="@{/recommend/favorites}" class="btn-link-strong">お気に入りリストを見る</a>
        </div>
    </div>

    <div class="card form-card">
        <h3>検索条件を設定</h3>

        <div th:if="${errorMessage != null}" class="inner-error-message">
            <p class="alert-danger-text" th:text="${errorMessage}"></p>
        </div>

        <form th:action="@{/recommend/ask}" th:object="${recommendForm}" method="post" class="form">
            
            <div class="form-group">
                <label>レベル (1〜9)</label>
                <select th:field="*{level}" class="form-select">
                    <option th:each="i : ${#numbers.sequence(1, 9)}" th:value="${i}" th:text="'レベル ' + ${i}"></option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('level')}" th:errors="*{level}"></div>
            </div>

            <div class="form-group">
                <label>本の種類</label>
                <select th:field="*{type}" class="form-select">
                    <option value="Graded Readers">多読用書籍 (Graded Readers)</option>
                    <option value="General Books">普通の本 (一般書・児童書など)</option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
            </div>

            <div class="form-group">
                <label>ジャンル</label>
                <select th:field="*{genre}" class="form-select">
                    <option value="Mystery">ミステリー・サスペンス</option>
                    <option value="Fantasy">ファンタジー</option>
                    <option value="Romance">恋愛・ロマンス</option>
                    <option value="SciFi">SF</option>
                    <option value="Action">バトル・アクション</option>
                    <option value="NonFiction">ノンフィクション</option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"></div>
            </div>

            <button type="submit" class="btn-primary center-submit-btn">AIにオススメを聞く</button>
        </form>
    </div>

    <div th:if="${aiRecommendations != null}" class="card results-card">
        <h3>AIからのオススメ結果</h3>
        
        <div class="recommendation-results">
            <div th:each="book : ${aiRecommendations}" class="book-item">
                <h4 th:text="${book.title}" class="book-title">本のタイトル</h4>
                
                <div class="book-meta-box">
                    <p class="book-detail"><strong>著者:</strong> <span th:text="${book.author}">著者名</span></p>
                    <p class="book-detail"><strong>シリーズ / 出版社:</strong> <span th:text="${book.publisher}">出版社名</span></p>
                </div>
                
				<p class="summary"><strong>【あらすじ】</strong> <span th:text="${book.summary}"></span></p>
				<p class="reason"><strong>【おすすめ理由】</strong> <span th:text="${book.reason}"></span></p>
                
                <form th:action="@{/recommend/favorite}" method="post" class="favorite-form">
                    <input type="hidden" name="title" th:value="${book.title}">
                    <input type="hidden" name="author" th:value="${book.author}">
                    <input type="hidden" name="publisher" th:value="${book.publisher}">
                    <input type="hidden" name="summary" th:value="${book.summary}">
                    
                    <button type="submit" class="btn-favorite">⭐ お気に入りに追加</button>
                </form>
            </div>
        </div>
    </div>

</div>

</body>
</html>
